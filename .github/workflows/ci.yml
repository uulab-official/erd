name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm format:check
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm build

  deploy-function:
    runs-on: ubuntu-latest
    # functions/deploy-appwrite is deliberately not a pnpm workspace member — it's
    # deployed by Appwrite's own build container via a plain `npm install`, which can't
    # resolve `workspace:*` deps. Verify it independently with its own npm lockfile.
    defaults:
      run:
        working-directory: functions/deploy-appwrite
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: functions/deploy-appwrite/package-lock.json

      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
